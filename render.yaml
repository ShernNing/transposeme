services:
  - type: web
    name: transposeme-server
    runtime: docker
    plan: free
    dockerfilePath: server/Dockerfile.conda
    dockerContext: server
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://transposeme.vercel.app
      - key: COOKIES_PATH
        value: /app/cookies.txt
